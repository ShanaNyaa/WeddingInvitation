services:
  backend:
    build:
      context: ./Backend
    ports:
      - "8080:8080"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    env_file:
      - .env.local
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./Frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload; node_modules stays in the container
      - ./Frontend:/app
      - /app/node_modules
    env_file:
      - .env.local
    depends_on:
      - backend
